<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>알림</title>
</head>

<body style="margin:0; padding:0; background-color:#f5f6f8;">

<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f6f8; padding:20px 0;">
    <tr>
        <td align="center">

            <!-- 메인 카드 -->
            <table width="600" cellpadding="0" cellspacing="0"
                   style="background:#ffffff; border-radius:10px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.05);">

                <!-- 헤더 -->
                <tr>
                    <td style="background:#4f46e5; padding:20px; text-align:center; color:white;">
                        <h2 style="margin:0;">Unified System</h2>
                        <p style="margin:5px 0 0; font-size:13px; opacity:0.8;">
                            Notification Service
                        </p>
                    </td>
                </tr>

                <!-- 본문 -->
                <tr>
                    <td style="padding:30px; font-family:Arial, sans-serif; color:#333;">

                        <h3 style="margin-top:0;">📧 메일 알림</h3>

                        <p style="font-size:14px; line-height:1.6;">
                            아래 내용을 확인해주세요.
                        </p>

                        <!-- 실제 내용 -->
                        <div style="margin:20px 0; padding:15px; background:#f9fafb; border-radius:6px;">
                            <p th:utext="${content}" style="margin:0;">
                                메일 내용
                            </p>
                        </div>

                        <!-- 버튼 (선택) -->
                        <div style="text-align:center; margin-top:30px;">
                            <a href="#"
                               style="display:inline-block;
                                      padding:12px 20px;
                                      background:#4f46e5;
                                      color:white;
                                      text-decoration:none;
                                      border-radius:6px;
                                      font-size:14px;">
                                확인하기
                            </a>
                        </div>

                    </td>
                </tr>

                <!-- 푸터 -->
                <tr>
                    <td style="padding:20px; text-align:center; font-size:12px; color:#999; background:#f9fafb;">
                        <p style="margin:0;">© 2026 Unified System</p>
                        <p style="margin:5px 0 0;">This is an automated message.</p>
                    </td>
                </tr>

            </table>

            <!-- 하단 여백 -->
            <div style="height:20px;"></div>

        </td>
    </tr>
</table>

</body>
</html>
