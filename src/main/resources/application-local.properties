# =========================================================
# Resilience4j - Approval
# =========================================================
resilience4j.retry.instances.approvalSoapRetry.max-attempts=2
resilience4j.retry.instances.approvalSoapRetry.wait-duration=500ms
resilience4j.retry.instances.approvalSoapRetry.retry-exceptions=org.springframework.ws.client.WebServiceIOException,java.net.SocketTimeoutException,java.util.concurrent.TimeoutException,java.lang.RuntimeException

resilience4j.circuitbreaker.instances.approvalSoapCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.approvalSoapCircuitBreaker.minimum-number-of-calls=2
resilience4j.circuitbreaker.instances.approvalSoapCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.approvalSoapCircuitBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.approvalSoapCircuitBreaker.record-exceptions=org.springframework.ws.client.WebServiceIOException,java.net.SocketTimeoutException,java.util.concurrent.TimeoutException,java.lang.RuntimeException

# =========================================================
# Resilience4j - Payment
# =========================================================
resilience4j.retry.instances.paymentSoapRetry.max-attempts=2
resilience4j.retry.instances.paymentSoapRetry.wait-duration=500ms
resilience4j.retry.instances.paymentSoapRetry.retry-exceptions=org.springframework.ws.client.WebServiceIOException,java.net.SocketTimeoutException,java.util.concurrent.TimeoutException,java.lang.RuntimeException

resilience4j.circuitbreaker.instances.paymentSoapCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.paymentSoapCircuitBreaker.minimum-number-of-calls=2
resilience4j.circuitbreaker.instances.paymentSoapCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.paymentSoapCircuitBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.paymentSoapCircuitBreaker.record-exceptions=org.springframework.ws.client.WebServiceIOException,java.net.SocketTimeoutException,java.util.concurrent.TimeoutException,java.lang.RuntimeException

