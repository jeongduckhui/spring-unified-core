############################################################
# Refresh Token \uC800\uC7A5 \uC804\uB7B5
############################################################

# RefreshToken \uC800\uC7A5 \uBC29\uC2DD \uC120\uD0DD
#
# db
#   - RefreshToken\uC744 RDBMS \uD14C\uC774\uBE14\uC5D0 \uC800\uC7A5
#   - \uB2E8\uC77C \uC11C\uBC84 \uB610\uB294 \uAC04\uB2E8\uD55C \uD658\uACBD\uC5D0\uC11C \uC0AC\uC6A9
#
# redis
#   - RefreshToken\uC744 Redis\uC5D0 \uC800\uC7A5
#   - \uBA40\uD2F0 \uC11C\uBC84 \uD658\uACBD\uC5D0\uC11C \uAD8C\uC7A5
#   - \uD1A0\uD070 \uC870\uD68C \uC131\uB2A5 \uBC0F \uD655\uC7A5\uC131 \uC6B0\uC218
#
# \uC774 \uC124\uC815\uC5D0 \uB530\uB77C RefreshTokenService \uAD6C\uD604\uCCB4\uAC00 \uC120\uD0DD\uB41C\uB2E4.
#
# db    -> RefreshTokenDbService
# redis -> RefreshTokenRedisService
#
# \uC6B4\uC601 \uD658\uACBD\uC5D0\uC11C\uB3C4 \uCF54\uB4DC \uC218\uC815 \uC5C6\uC774 \uC124\uC815\uB9CC \uBCC0\uACBD\uD558\uBA74
# \uC800\uC7A5\uC18C \uC804\uB7B5\uC744 \uBCC0\uACBD\uD560 \uC218 \uC788\uB2E4.
app.refresh-token.store=redis


############################################################
# P6Spy SQL Logging (LOCAL ONLY)
############################################################

# p6spy \uD65C\uC131\uD654
decorator.datasource.p6spy.enable-logging=true

# slf4j \uB85C\uAE45 \uC0AC\uC6A9
decorator.datasource.p6spy.logging=slf4j

# multiline SQL \uCD9C\uB825
decorator.datasource.p6spy.multiline=true

# slow query \uB85C\uAE45 \uD65C\uC131\uD654
decorator.datasource.p6spy.slow-query.enable-logging=true

# slow query \uAE30\uC900 (ms)
decorator.datasource.p6spy.slow-query.threshold=300


############################################################
# MyBatis / Hibernate \uAE30\uBCF8 SQL \uB85C\uADF8 \uC81C\uAC70
############################################################

# MyBatis \uAE30\uBCF8 \uB85C\uADF8 \uC81C\uAC70
mybatis.configuration.log-impl=org.apache.ibatis.logging.nologging.NoLoggingImpl

# Hibernate SQL \uB85C\uADF8 \uC81C\uAC70
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=OFF


############################################################
# SQL \uB85C\uADF8 \uB808\uBCA8
############################################################

# p6spy \uB85C\uADF8 \uB808\uBCA8
logging.level.p6spy=INFO

############################################################
# Swagger \uC124\uC815
############################################################

springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true


# =========================
# \uD504\uB85C\uD30C\uC77C \uC124\uC815 local/s3
