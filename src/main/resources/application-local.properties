############################################################
# Server
############################################################

server.port=8081

############################################################
# H2 Database (Local Development Only)
############################################################

# H2 \uCF58\uC194 \uD65C\uC131\uD654
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# H2 DB \uC5F0\uACB0
# MODE=Oracle : Oracle \uBB38\uBC95 \uD638\uD658
# DATABASE_TO_UPPER=false : \uD14C\uC774\uBE14 \uC774\uB984 \uB300\uBB38\uC790 \uBCC0\uD658 \uBC29\uC9C0
# CASE_INSENSITIVE_IDENTIFIERS : \uCEEC\uB7FC \uB300\uC18C\uBB38\uC790 \uAD6C\uBD84 \uC548\uD568
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:tcp://localhost/~/testdb;MODE=Oracle;DATABASE_TO_UPPER=false;CASE_INSENSITIVE_IDENTIFIERS=TRUE


############################################################
# SQL \uCD08\uAE30\uD654
############################################################

# schema.sql / data.sql \uC790\uB3D9 \uC2E4\uD589
spring.sql.init.mode=always


############################################################
# JPA \uC124\uC815
############################################################

# \uD14C\uC774\uBE14 \uC790\uB3D9 \uC0DD\uC131/\uC218\uC815
spring.jpa.hibernate.ddl-auto=update

# \uC5D4\uD2F0\uD2F0 -> DB snake_case \uBCC0\uD658
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# SQL \uBCF4\uAE30 \uC88B\uAC8C \uD3EC\uB9F7
spring.jpa.properties.hibernate.format_sql=true

# LOB \uC0DD\uC131 \uC2DC Hibernate \uC624\uB958 \uBC29\uC9C0
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true


############################################################
# OAuth2 / OIDC Client \uC124\uC815
############################################################

############################
# Keycloak Client
############################

spring.security.oauth2.client.registration.keycloak.client-id=oauth2-client-app
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email

############################
# Google Client
############################

spring.security.oauth2.client.registration.google.scope=openid,profile,email


############################################################
# OAuth2 Provider
############################################################

# Keycloak Realm issuer
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8080/realms/oauth2


############################################################
# JWT \uC124\uC815
############################################################

# JWT \uC11C\uBA85\uC6A9 secret
# \uC2E4\uC81C \uC6B4\uC601\uC5D0\uC11C\uB294 \uD658\uACBD\uBCC0\uC218 \uB610\uB294 Vault \uC0AC\uC6A9 \uAD8C\uC7A5
jwt.secret=your-very-long-and-secure-secret-key-for-hmac-signing-which-must-be-long-enough

# Access Token \uB9CC\uB8CC \uC2DC\uAC04 (\uCD08)
jwt.access-token-expiration-seconds=1800

# \uD1A0\uD070 \uBC1C\uAE09\uC790
jwt.issuer=com.example.demo


############################################################
# Refresh Token \uC800\uC7A5 \uC804\uB7B5
############################################################

# RefreshToken \uC800\uC7A5 \uBC29\uC2DD \uC120\uD0DD
#
# db
#   - RefreshToken\uC744 RDBMS \uD14C\uC774\uBE14\uC5D0 \uC800\uC7A5
#   - \uB2E8\uC77C \uC11C\uBC84 \uB610\uB294 \uAC04\uB2E8\uD55C \uD658\uACBD\uC5D0\uC11C \uC0AC\uC6A9
#
# redis
#   - RefreshToken\uC744 Redis\uC5D0 \uC800\uC7A5
#   - \uBA40\uD2F0 \uC11C\uBC84 \uD658\uACBD\uC5D0\uC11C \uAD8C\uC7A5
#   - \uD1A0\uD070 \uC870\uD68C \uC131\uB2A5 \uBC0F \uD655\uC7A5\uC131 \uC6B0\uC218
#
# \uC774 \uC124\uC815\uC5D0 \uB530\uB77C RefreshTokenService \uAD6C\uD604\uCCB4\uAC00 \uC120\uD0DD\uB41C\uB2E4.
#
# db    -> RefreshTokenDbService
# redis -> RefreshTokenRedisService
#
# \uC6B4\uC601 \uD658\uACBD\uC5D0\uC11C\uB3C4 \uCF54\uB4DC \uC218\uC815 \uC5C6\uC774 \uC124\uC815\uB9CC \uBCC0\uACBD\uD558\uBA74
# \uC800\uC7A5\uC18C \uC804\uB7B5\uC744 \uBCC0\uACBD\uD560 \uC218 \uC788\uB2E4.
app.refresh-token.store=redis


############################################################
# P6Spy SQL Logging (LOCAL ONLY)
############################################################

# p6spy \uD65C\uC131\uD654
decorator.datasource.p6spy.enable-logging=true

# slf4j \uB85C\uAE45 \uC0AC\uC6A9
decorator.datasource.p6spy.logging=slf4j

# multiline SQL \uCD9C\uB825
decorator.datasource.p6spy.multiline=true

# slow query \uB85C\uAE45 \uD65C\uC131\uD654
decorator.datasource.p6spy.slow-query.enable-logging=true

# slow query \uAE30\uC900 (ms)
decorator.datasource.p6spy.slow-query.threshold=300


############################################################
# MyBatis / Hibernate \uAE30\uBCF8 SQL \uB85C\uADF8 \uC81C\uAC70
############################################################

# MyBatis \uAE30\uBCF8 \uB85C\uADF8 \uC81C\uAC70
mybatis.configuration.log-impl=org.apache.ibatis.logging.nologging.NoLoggingImpl

# Hibernate SQL \uB85C\uADF8 \uC81C\uAC70
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=OFF


############################################################
# SQL \uB85C\uADF8 \uB808\uBCA8
############################################################

# p6spy \uB85C\uADF8 \uB808\uBCA8
logging.level.p6spy=INFO

############################################################
# Swagger \uC124\uC815
############################################################

springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true


# =========================
# \uD504\uB85C\uD30C\uC77C \uC124\uC815 local/s3
# =========================
file.storage.type=local

############################################################
# \uD30C\uC77C \uC124\uC815
############################################################

file.upload-dir=E:/myplayground/upload/
file.allowed-extensions=jpg,jpeg,png,pdf,txt
# \uD30C\uC77C 1\uAC1C \uCD5C\uB300 \uD06C\uAE30
spring.servlet.multipart.max-file-size=50MB
# \uC804\uCCB4 \uC694\uCCAD \uD06C\uAE30 (\uBA40\uD2F0 \uC5C5\uB85C\uB4DC \uD569\uACC4)
spring.servlet.multipart.max-request-size=100MB
# \uD30C\uC77C\uC0AD\uC81C \uAE30\uC900\uC77C
file.cleanup.days=7
# \uD14C\uC2A4\uD2B8\uC6A9 \uB2F9\uC77C
#file.cleanup.days=0


############################################################
# Access/Refresh Token \uC124\uC815
############################################################

# \uAC1C\uBC1C:false, \uC6B4\uC601: true
app.cookie.secure=false
# SPA + cross domain
app.cookie.same-site=None
app.cookie.domain=.company.com

# Access Token (30\uBD84)
app.auth.access-expire-seconds=1800
# Refresh Token \uB9CC\uB8CC (\uCD08), 1209600 = 14\uC77C
app.auth.refresh-expire-seconds=1209600


# =========================
# AWS S3 \uC124\uC815
# =========================
aws.s3.bucket=demo-files-571741813439-ap-northeast-2-an
aws.s3.region=ap-northeast-2

# =========================
# AWS \uC778\uC99D \uC815\uBCF4
# =========================




############################################################
# \uAD8C\uD55C \uCCB4\uD06C \uC0AC\uC6A9 \uC5EC\uBD80
############################################################

app.auth.enabled=false

