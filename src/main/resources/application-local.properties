############################################################
# Server
############################################################

server.port=8081

############################################################
# H2 Database (Local Development Only)
############################################################

# H2 \uCF58\uC194 \uD65C\uC131\uD654
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# H2 DB \uC5F0\uACB0
# MODE=Oracle : Oracle \uBB38\uBC95 \uD638\uD658
# DATABASE_TO_UPPER=false : \uD14C\uC774\uBE14 \uC774\uB984 \uB300\uBB38\uC790 \uBCC0\uD658 \uBC29\uC9C0
# CASE_INSENSITIVE_IDENTIFIERS : \uCEEC\uB7FC \uB300\uC18C\uBB38\uC790 \uAD6C\uBD84 \uC548\uD568
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:tcp://localhost/~/testdb;MODE=Oracle;DATABASE_TO_UPPER=false;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.username=sa
spring.datasource.password=


############################################################
# SQL \uCD08\uAE30\uD654
############################################################

# schema.sql / data.sql \uC790\uB3D9 \uC2E4\uD589
spring.sql.init.mode=always


############################################################
# JPA \uC124\uC815
############################################################

# \uD14C\uC774\uBE14 \uC790\uB3D9 \uC0DD\uC131/\uC218\uC815
spring.jpa.hibernate.ddl-auto=update

# \uC5D4\uD2F0\uD2F0 -> DB snake_case \uBCC0\uD658
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# SQL \uBCF4\uAE30 \uC88B\uAC8C \uD3EC\uB9F7
spring.jpa.properties.hibernate.format_sql=true

# LOB \uC0DD\uC131 \uC2DC Hibernate \uC624\uB958 \uBC29\uC9C0
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true


